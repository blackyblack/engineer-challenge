syntax = "proto3";

package auth;

/**
 * Auth Service — gRPC API Definition
 *
 * Bounded Contexts exposed:
 * - Identity: Register
 * - Authentication: Login, ValidateSession
 * - Password Recovery: RequestPasswordReset, ResetPassword
 */
service AuthService {
  // Commands (write side)
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  // Queries (read side)
  rpc ValidateSession(ValidateSessionRequest) returns (ValidateSessionResponse);
}

// --- Identity Context: Registration ---

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
  string email = 2;
}

// --- Authentication Context: Login ---

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 access_token_expires_at = 3;
  int64 refresh_token_expires_at = 4;
}

// --- Password Recovery Context ---

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  string message = 1;
  // In production, token is NOT returned; it's sent via email.
  // Included here for demonstration/testing purposes.
  string reset_token = 2;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  string message = 1;
}

// --- Authentication Context: Session Validation ---

message ValidateSessionRequest {
  string access_token = 1;
}

message ValidateSessionResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
}
